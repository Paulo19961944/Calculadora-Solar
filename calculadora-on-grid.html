<!DOCTYPE html>
<html>
<head>
	
	<meta charset="utf-8">
	<title>Calculadora Projeto Solar</title>
	<link rel="stylesheet" href="css/estilo.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
		<!-- JavaScript Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>

	<header>
		<h1 class="titulo">Calculadora de Projeto Solar</h1>
	</header>

	<section>

		<a><h1 id="on-grid">Calculo On Grid</h1></a>
		<form action="" method="get">
			<p>Energia Anual (12 meses)</p><input type="text" name="EMM" id="EMM" placeholder="Energia Anual (KW)"><br>
			<p>HSP do Local</p><input type="text" name="EMM" id="EMM" placeholder="HSP do Local">
			<p>Temperatura Media do Local (Cº)</p><input type="text" name="EMM" id="EMM" placeholder="Temperatura Media">
			<p>Potência do Modulo (W)</p><input type="text" name="EMM" id="EMM" placeholder="Potência do Modulo">
			<p>Tensão de Startup (Inversor)</p><input type="text" name="EMM" id="EMM" placeholder="Tensão de Startup">
			<p>Tensão Maxima do Inversor</p><input type="text" name="EMM" id="EMM" placeholder="Tensão do Inversor">
			<p>Corrente Maxima do Inversor</p><input type="text" name="EMM" id="EMM" placeholder="Corrente do Inversor">
		</form>
		
		
	</section>

	<footer>

		<p class="autor">Criado por Paulo Henrique Azevedo do Nascimento</p>
		<a href="https://paulo19961944.github.io/Calculadora-Solar/index.html" class="return"><p class="voltar">Voltar</p></a>			
	</footer>

</body>
</html>
